# Runs ruff, mypy, pytest (with coverage), Docker build, and pip-audit on pushes/PRs.
name: CI

on:
  push:
    branches: [main, develop]
  # All pull requests (any target branch) — typical for GitHub PR workflow
  pull_request:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Lint & static analysis ─────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff — lint
        run: ruff check src/ dags/ tests/

      - name: Ruff — format check
        run: ruff format --check src/ dags/ tests/

      - name: Mypy — type check
        run: mypy src/ --ignore-missing-imports --no-error-summary

  # ── Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          # Dummy env so src/config.py imports succeed during pytest (aligned with Makefile `make test`).
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test
          MISP_URL: https://misp.local
          MISP_API_KEY: test-key-12345678901234567890
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=30

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Docker build check ────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t edgeguard-kg:ci .

      - name: Build Airflow worker image
        run: docker build -f Dockerfile.airflow -t edgeguard-airflow:ci .

  # ── Security scanning ─────────────────────────────────────────────────────
  security:
    name: Dependency security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies for known CVEs
        run: |
          # Airflow was upgraded 2.11 → 3.2 in April 2026. The large GHSA
          # ignore list that used to live here (18 entries covering
          # apache-airflow, flask, flask-appbuilder, requests, pygments) was
          # entirely obsolete after the upgrade — a local pip-audit run
          # against the new requirements.txt reported "No known
          # vulnerabilities found" with zero ignores.
          #
          # New CVEs should be addressed by upgrading the affected package,
          # not by re-adding to this ignore list. Only add `--ignore-vuln`
          # entries as a temporary measure when the fix version is not yet
          # available, and always include a code comment explaining why
          # and a tracking ticket.
          pip-audit -r requirements.txt --output json -o pip-audit.json

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit
          path: pip-audit.json
