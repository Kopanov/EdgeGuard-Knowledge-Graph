# Runs ruff, mypy, pytest (with coverage), Docker build, and pip-audit on pushes/PRs.
name: CI

on:
  push:
    branches: [main, develop]
  # All pull requests (any target branch) — typical for GitHub PR workflow
  pull_request:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Lint & static analysis ─────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff — lint
        run: ruff check src/ dags/ tests/ scripts/

      - name: Ruff — format check
        run: ruff format --check src/ dags/ tests/ scripts/

      - name: Mypy — type check
        run: mypy src/ scripts/ --ignore-missing-imports --no-error-summary

  # ── Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          # Dummy env so src/config.py imports succeed during pytest (aligned with Makefile `make test`).
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test
          MISP_URL: https://misp.local
          MISP_API_KEY: test-key-12345678901234567890
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=30

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Docker build + image vulnerability scan ───────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t edgeguard-kg:ci .

      - name: Build Airflow worker image
        run: docker build -f Dockerfile.airflow -t edgeguard-airflow:ci .

      # PR-B audit fix (Dependency MED-4): pip-audit (in the security job)
      # only sees what's in requirements.txt — it MISSES OS-package CVEs in
      # the Docker base image AND transitive Python deps that the runtime
      # image picks up (e.g. Flask 2.2.5 / FAB / aiohttp / cryptography
      # bundled by the apache/airflow base image but not declared in our
      # requirements.txt). Trivy scans the actual built image's filesystem,
      # closing that blind spot.
      #
      # Severity gate: HIGH+CRITICAL fail the job; MED/LOW are reported as
      # warnings (not yet failing — we'd need to triage the airflow base
      # image's existing MED debt before turning that on). The
      # ``--ignore-unfixed`` flag skips findings with no upstream patch
      # available, so the job doesn't fire on un-actionable noise.
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy scan — edgeguard-kg image (HIGH+CRITICAL fails)
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            --no-progress \
            --format table \
            edgeguard-kg:ci

      - name: Trivy scan — edgeguard-airflow image (HIGH+CRITICAL fails)
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            --no-progress \
            --format table \
            edgeguard-airflow:ci

      # Informational MED/LOW report — does NOT fail the job, just surfaces
      # the airflow base image's existing debt for triage.
      - name: Trivy scan — MED/LOW informational (continue-on-error)
        continue-on-error: true
        run: |
          echo "=== edgeguard-kg MED/LOW ==="
          trivy image --severity MEDIUM,LOW --ignore-unfixed --no-progress --format table edgeguard-kg:ci || true
          echo "=== edgeguard-airflow MED/LOW ==="
          trivy image --severity MEDIUM,LOW --ignore-unfixed --no-progress --format table edgeguard-airflow:ci || true

  # ── Security scanning ─────────────────────────────────────────────────────
  security:
    name: Dependency security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies for known CVEs
        run: |
          # Airflow was upgraded 2.11 → 3.2 in April 2026. The large GHSA
          # ignore list that used to live here (18 entries covering
          # apache-airflow, flask, flask-appbuilder, requests, pygments) was
          # entirely obsolete after the upgrade — pip-audit against the
          # new requirements.txt reports "No known vulnerabilities found"
          # with zero ignores.
          #
          # Caveat on Flask CVE-2026-27205 (see
          # docs/AIRFLOW_DAGS.md § "Flask on Airflow 3.2 — reality check"):
          # the apache/airflow:3.2.0 base Docker image bundles Flask 2.2.5
          # via the apache-airflow-providers-fab auth manager. That
          # provider is NOT pulled by this pip-install path (requirements.txt
          # only lists apache-airflow[postgres] + providers-standard), so
          # Flask is not in the tree pip-audit sees. Flask 2.2.5 IS still
          # vulnerable to CVE-2026-27205 in the Docker deployment — the
          # CVE is accepted operationally because docker-compose.yml binds
          # the Airflow API server to 127.0.0.1 only (no network exposure).
          # A future fix requires replacing apache-airflow-providers-fab
          # (which hard-pins flask<2.3) with a Flask-3 compatible auth
          # manager. Tracked in backlog.
          #
          # New CVEs should be addressed by upgrading the affected package,
          # not by re-adding to this ignore list. Only add `--ignore-vuln`
          # entries as a temporary measure when the fix version is not yet
          # available, and always include a code comment explaining why
          # and a tracking ticket.
          pip-audit -r requirements.txt --output json -o pip-audit.json

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit
          path: pip-audit.json
