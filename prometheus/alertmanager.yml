# ================================================================================
# AlertManager Configuration
# ================================================================================

global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alertmanager@edgeguard.local'
  smtp_auth_username: ''
  smtp_auth_password: ''
  slack_api_url: ''  # Set via SLACK_WEBHOOK_URL environment variable

# Templates for notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route notifications to different receivers
route:
  receiver: 'default'
  group_by: ['alertname', 'severity', 'component']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  
  routes:
    # Critical alerts go to multiple channels
    - match:
        severity: critical
      receiver: 'critical'
      continue: true
    
    # Circuit breaker alerts
    - match:
        component: circuit-breaker
      receiver: 'on-call'
      group_interval: 2m
      repeat_interval: 1h
    
    # Collector issues
    - match:
        component: collector
      receiver: 'team-platform'

# Inhibition rules to suppress notifications
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'component']

# Receivers define notification channels
receivers:
  - name: 'default'
    email_configs:
      - to: 'admin@edgeguard.local'
        subject: 'EdgeGuard Alert: {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Labels: {{ .Labels }}
          {{ end }}

  - name: 'critical'
    email_configs:
      - to: 'oncall@edgeguard.local'
        subject: '🚨 CRITICAL: EdgeGuard Alert - {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#edgeguard-alerts'
        title: '🚨 EdgeGuard Critical Alert'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}
        send_resolved: true

  - name: 'on-call'
    pagerduty_configs:
      - service_key: '<YOUR_PAGERDUTY_KEY>'
        description: '{{ .GroupLabels.alertname }}'
        severity: '{{ .GroupLabels.severity }}'

  - name: 'team-platform'
    slack_configs:
      - channel: '#edgeguard-platform'
        title: 'EdgeGuard Platform Alert'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}
        send_resolved: true
