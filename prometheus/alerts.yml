# ================================================================================
# EdgeGuard Prometheus Alert Rules
# ================================================================================

groups:
  # ================================================================================
  # Collection Alerts
  # ================================================================================
  - name: edgeguard_collection
    rules:
      - alert: EdgeGuardCollectionHighFailureRate
        expr: |
          (
            sum by (source) (rate(edgeguard_collection_failures_total[5m]))
            /
            sum by (source) (rate(edgeguard_indicators_collected_total[5m]) > 0)
          ) > 0.2
        for: 5m
        labels:
          severity: warning
          component: collector
        annotations:
          summary: "High failure rate for {{ $labels.source }} collector"
          description: "{{ $labels.source }} collector has a failure rate above 20% for the last 5 minutes."

      - alert: EdgeGuardCollectionStale
        expr: time() - edgeguard_last_success_timestamp > 3600
        for: 5m
        labels:
          severity: critical
          component: collector
        annotations:
          summary: "Collection stale for {{ $labels.source }}"
          description: "No successful collection from {{ $labels.source }} in over 1 hour."

      - alert: EdgeGuardNoIndicatorsCollected
        expr: |
          sum by (source) (increase(edgeguard_indicators_collected_total[1h])) == 0
          and
          edgeguard_source_health{source=~"otx|nvd|cisa|abuseipdb"} == 1
        for: 30m
        labels:
          severity: warning
          component: collector
        annotations:
          summary: "No indicators collected from {{ $labels.source }}"
          description: "{{ $labels.source }} has not collected any indicators in the last hour."

  # ================================================================================
  # Circuit Breaker Alerts
  # ================================================================================
  - name: edgeguard_circuit_breaker
    rules:
      - alert: EdgeGuardCircuitBreakerOpen
        expr: edgeguard_circuit_breaker_state == 2
        for: 1m
        labels:
          severity: critical
          component: circuit-breaker
        annotations:
          summary: "Circuit breaker OPEN for {{ $labels.service }}"
          description: "The circuit breaker for {{ $labels.service }} is OPEN. Service is failing."

      - alert: EdgeGuardCircuitBreakerHalfOpen
        expr: edgeguard_circuit_breaker_state == 1
        for: 5m
        labels:
          severity: warning
          component: circuit-breaker
        annotations:
          summary: "Circuit breaker HALF-OPEN for {{ $labels.service }}"
          description: "The circuit breaker for {{ $labels.service }} is testing recovery."

      - alert: EdgeGuardConsecutiveFailuresHigh
        expr: edgeguard_consecutive_failures > 5
        for: 5m
        labels:
          severity: warning
          component: circuit-breaker
        annotations:
          summary: "High consecutive failures for {{ $labels.service }}"
          description: "{{ $labels.service }} has {{ $value }} consecutive failures."

  # ================================================================================
  # Service Health Alerts
  # ================================================================================
  - name: edgeguard_health
    rules:
      - alert: EdgeGuardServiceDown
        expr: edgeguard_service_up == 0
        for: 2m
        labels:
          severity: critical
          component: health
        annotations:
          summary: "Service {{ $labels.service }} is DOWN"
          description: "Health check failed for {{ $labels.service }}."

      - alert: EdgeGuardMISPUnhealthy
        expr: edgeguard_misp_health == 0
        for: 2m
        labels:
          severity: critical
          component: misp
        annotations:
          summary: "MISP {{ $labels.check_type }} is unhealthy"
          description: "MISP {{ $labels.check_type }} health check has failed."

      - alert: EdgeGuardSourceUnhealthy
        expr: edgeguard_source_health == 0
        for: 5m
        labels:
          severity: warning
          component: source
        annotations:
          summary: "Source {{ $labels.source }} ({{ $labels.zone }}) is unhealthy"
          description: "Data source {{ $labels.source }} in zone {{ $labels.zone }} is marked as unhealthy."

  # ================================================================================
  # Pipeline Alerts
  # ================================================================================
  - name: edgeguard_pipeline
    rules:
      - alert: EdgeGuardPipelineDurationHigh
        expr: |
          histogram_quantile(0.95, 
            sum(rate(edgeguard_pipeline_duration_seconds_bucket[5m])) by (le, pipeline_type)
          ) > 300
        for: 5m
        labels:
          severity: warning
          component: pipeline
        annotations:
          summary: "Pipeline {{ $labels.pipeline_type }} is slow"
          description: "Pipeline {{ $labels.pipeline_type }} 95th percentile duration is over 5 minutes."

      - alert: EdgeGuardNeo4jSyncStale
        expr: time() - (edgeguard_neo4j_sync_duration_seconds_count > 0) > 259200
        for: 1h
        labels:
          severity: warning
          component: neo4j
        annotations:
          summary: "Neo4j sync is stale"
          description: "No Neo4j sync has completed in over 72 hours."

      - alert: EdgeGuardDAGRunFailures
        expr: |
          sum by (dag_id) (increase(edgeguard_dag_runs_total{status="failure"}[1h])) > 3
        for: 15m
        labels:
          severity: warning
          component: airflow
        annotations:
          summary: "DAG {{ $labels.dag_id }} has multiple failures"
          description: "DAG {{ $labels.dag_id }} has had more than 3 failures in the last hour."

      - alert: EdgeGuardDAGRunStuck
        expr: |
          (
            edgeguard_dag_run_start_timestamp > 0
            and (time() - edgeguard_dag_run_start_timestamp) > 3600
            and changes(edgeguard_dag_run_start_timestamp[30m]) == 0
          )
        for: 5m
        labels:
          severity: critical
          component: pipeline
        annotations:
          summary: "DAG run {{ $labels.dag_id }} appears stuck"
          description: "DAG {{ $labels.dag_id }} has had no task progress in over 1 hour (gauge unchanged for 30m)."

      - alert: EdgeGuardDAGLastSuccessStale
        expr: |
          edgeguard_dag_last_success_timestamp > 0
          and (time() - edgeguard_dag_last_success_timestamp) > 21600
          and edgeguard_dag_last_success_timestamp{dag_id!~"edgeguard_daily|edgeguard_neo4j_sync|edgeguard_baseline"}
        for: 15m
        labels:
          severity: warning
          component: pipeline
        annotations:
          summary: "No successful {{ $labels.dag_id }} run in 6 hours"
          description: "Last successful run of {{ $labels.dag_id }} was over 6 hours ago. Only applies to high/medium-frequency DAGs."

      - alert: EdgeGuardDailyDAGStale
        expr: |
          edgeguard_dag_last_success_timestamp{dag_id="edgeguard_daily"} > 0
          and (time() - edgeguard_dag_last_success_timestamp{dag_id="edgeguard_daily"}) > 90000
        for: 15m
        labels:
          severity: warning
          component: pipeline
        annotations:
          summary: "Daily DAG has not succeeded in over 25 hours"
          description: "edgeguard_daily runs once per day — no success in 25+ hours indicates a problem."

  # ================================================================================
  # Container Health Alerts (requires cAdvisor)
  # ================================================================================
  - name: edgeguard_containers
    rules:
      - alert: EdgeGuardContainerRestartLoop
        expr: |
          increase(container_restart_count{name=~"edgeguard.*"}[1h]) > 3
        for: 5m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Container {{ $labels.name }} is in a restart loop"
          description: "{{ $labels.name }} has restarted {{ $value }} times in the last hour."

  # ================================================================================
  # Sync integrity — catches silent event drops in MISP->Neo4j sync.
  # Added after the 2026-04-14 NVD regression: a single MISP 500 on a
  # corrupted event caused ~99K CVEs to vanish from Neo4j and no alert
  # fired, because the existing rules only watch for total counts going
  # below a global floor (sum < 100) and had no signal for per-run
  # coverage gaps or per-label drops.
  # ================================================================================
  - name: edgeguard_sync_integrity
    rules:
      - alert: EdgeGuardSyncEventsFailed
        expr: edgeguard_sync_events_failed > 0
        for: 5m
        labels:
          severity: critical
          component: sync
        annotations:
          summary: "MISP->Neo4j sync had {{ $value }} failed event(s)"
          description: |
            The most recent MISP->Neo4j sync permanently failed to process
            {{ $value }} event(s) after all retries. Check pipeline logs for
            the event IDs and the underlying error (usually MISP 5xx on a
            corrupted event, or Neo4j connection loss).

      - alert: EdgeGuardSyncCoverageGap
        expr: |
          (
            edgeguard_sync_events_index_total
            - edgeguard_sync_events_processed
            - edgeguard_sync_events_failed
          ) != 0
        for: 5m
        labels:
          severity: critical
          component: sync
        annotations:
          summary: "MISP->Neo4j sync accounting gap: {{ $value }} unaccounted event(s)"
          description: |
            MISP index returned {{ with query "edgeguard_sync_events_index_total" }}{{ . | first | value }}{{ end }}
            events, but processed + failed does not equal that total. This
            means events were SILENTLY SKIPPED — the exact failure pattern
            of the 2026-04-14 NVD regression. Investigate immediately.

      - alert: EdgeGuardNeo4jLabelDropBig
        # Per-label 1-day drop > 50% of yesterday's value. Uses offset so
        # the comparison is against the same time yesterday — robust to
        # normal daily fluctuation but catches catastrophic loss like
        # CVE count 99K -> 980 (the NVD regression).
        # Minimum floor of 100 nodes to avoid noise on small labels.
        #
        # PromQL `and` returns the LHS vector filtered by the RHS label set,
        # so the current (today's) value must be on the left — otherwise
        # $value in the annotation would be yesterday's count, not today's.
        expr: |
          (
            edgeguard_neo4j_nodes
            <
            0.5 * (edgeguard_neo4j_nodes offset 1d)
          )
          and
          (edgeguard_neo4j_nodes offset 1d) > 100
        for: 15m
        labels:
          severity: critical
          component: neo4j
        annotations:
          summary: "Neo4j {{ $labels.label }} count dropped >50% in 24h"
          description: |
            {{ $labels.label }} (zone={{ $labels.zone }}) went from
            {{ with printf "edgeguard_neo4j_nodes{label=\"%s\",zone=\"%s\"} offset 1d" $labels.label $labels.zone | query }}
            {{ . | first | value }}{{ end }} to {{ $value }} in the last 24h.
            This usually indicates a silent skip in MISP->Neo4j sync or a
            truncated feed push. Cross-check edgeguard_sync_events_failed
            and MISP event health.

  # ================================================================================
  # Neo4j Alerts
  # ================================================================================
  - name: edgeguard_neo4j
    rules:
      - alert: EdgeGuardNeo4jNodesLow
        expr: sum(edgeguard_neo4j_nodes) < 100
        for: 1h
        labels:
          severity: warning
          component: neo4j
        annotations:
          summary: "Neo4j node count is unexpectedly low"
          description: "Total Neo4j nodes ({{ $value }}) is below expected threshold."

      - alert: EdgeGuardNeo4jQuerySlow
        expr: |
          histogram_quantile(0.95,
            sum(rate(edgeguard_neo4j_query_duration_seconds_bucket[5m])) by (le, query_type)
          ) > 5
        for: 5m
        labels:
          severity: warning
          component: neo4j
        annotations:
          summary: "Neo4j queries are slow"
          description: "{{ $labels.query_type }} queries 95th percentile is over 5 seconds."

  # ================================================================================
  # Host / Infrastructure Alerts
  # ================================================================================
  # PR-A audit fix (Prod Readiness HIGH): node-exporter is scraped by
  # prometheus.yml (see job ``node-exporter``) but no rule consumed its
  # output. A 730d baseline can fill 100GB of MISP attachments + airflow
  # logs unmonitored — Vanko's overnight ran ~8h and was already eating
  # several GB. Three rules cover the typical disk-full failure modes:
  # imminent (5%), warning (15%), and inode exhaustion (which can hit
  # before bytes-free does on filesystems with many small files like
  # airflow_logs).
  - name: edgeguard_host_disk
    rules:
      - alert: EdgeGuardDiskFree15Pct
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|devtmpfs"}
            / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|devtmpfs"}
          ) < 0.15
        for: 10m
        labels:
          severity: warning
          component: host
        annotations:
          summary: "Disk free below 15% on {{ $labels.mountpoint }}"
          description: |
            {{ $labels.mountpoint }} on {{ $labels.instance }} is at
            {{ $value | humanizePercentage }} free. The next baseline run
            (~50-100GB across MISP + Neo4j + airflow_logs) will likely
            trigger DiskFree5Pct. Action: prune airflow_logs older than 30d
            or expand the volume.

      - alert: EdgeGuardDiskFree5Pct
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|devtmpfs"}
            / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|devtmpfs"}
          ) < 0.05
        for: 2m
        labels:
          severity: critical
          component: host
        annotations:
          summary: "Disk free CRITICAL: below 5% on {{ $labels.mountpoint }}"
          description: |
            {{ $labels.mountpoint }} on {{ $labels.instance }} is at
            {{ $value | humanizePercentage }} free. Neo4j will enter
            read-only mode soon (which the writability healthcheck will
            detect — but writes already fail). Pause all collectors:
            ``edgeguard dag pause``. Then prune or expand.

      - alert: EdgeGuardInodesFree10Pct
        expr: |
          (
            node_filesystem_files_free{fstype!~"tmpfs|overlay|devtmpfs"}
            / node_filesystem_files{fstype!~"tmpfs|overlay|devtmpfs"}
          ) < 0.10
        for: 10m
        labels:
          severity: warning
          component: host
        annotations:
          summary: "Inodes free below 10% on {{ $labels.mountpoint }}"
          description: |
            {{ $labels.mountpoint }} has {{ $value | humanizePercentage }}
            inodes free. airflow_logs creates many small files; ext4
            volumes can exhaust inodes well before bytes. Prune logs.

  # ================================================================================
  # PR-N4 / PR-N5 / PR-N9 observability metrics (PR-N11 follow-up)
  # ================================================================================
  # These rules surface the counters added in PR-N4 (MISP-at-scale),
  # PR-N5 (C7 honest-NULL validator), and PR-N9 (Neo4j MERGE
  # ineffective-batch). Pre-PR-N11, the metrics existed but no alert
  # fired — the observability investment was invisible to operators.
  #
  # Baseline on-call: during the 730d baseline run, a non-zero rate
  # on ANY of these alerts means silent data loss or semantic drift.
  # Pre-PR-N7/N8/N9 the symptoms (multi-hour stalls, missing edges,
  # confidence flaps) were only diagnosed post-hoc; these alerts flip
  # detection latency from hours to 5-15 minutes.
  - name: edgeguard_pipeline_observability
    rules:
      - alert: EdgeGuardMispBatchPermanentFailure
        expr: sum by (source) (rate(edgeguard_misp_push_permanent_failure_total[5m])) > 0
        for: 5m
        labels:
          severity: critical
          component: misp_writer
        annotations:
          summary: "EdgeGuard losing MISP batches permanently ({{ $labels.source }})"
          description: |
            MISPWriter rejected one or more attribute batches after
            ``@retry_with_backoff(max_retries=4)`` exhausted. Each
            failure is ~500 attributes lost. Pre-PR-N4 this was a
            hand-counted log-line; now alertable.

            Remediation:
              1. Check MISP backend RAM / PHP memory_limit
              2. Check MySQL innodb_buffer_pool_size
              3. See docs/MISP_TUNING.md and docs/RUNBOOK.md § MISP OOM

      - alert: EdgeGuardMispSustainedBackoff
        # Use `increase()` (absolute count over window), NOT `rate()`
        # which returns a per-second average — `rate(...) > 1` would
        # mean >1/sec = >900/15min, 900x the intended threshold.
        # Cursor-bugbot 2026-04-21 HIGH.
        expr: sum by (source) (increase(edgeguard_misp_push_backoff_triggered_total[15m])) > 1
        for: 15m
        labels:
          severity: warning
          component: misp_writer
        annotations:
          summary: "EdgeGuard MISPWriter in extended cooldown >1×/15min ({{ $labels.source }})"
          description: |
            MISPWriter is hitting consecutive 5xx failures often enough
            to enter the 5-minute extended cooldown more than once per
            15 minutes. Backend is sustained-degraded. Distinguishes
            "occasional flap" from "sustained overload."

      - alert: EdgeGuardMispHonestNullViolation
        # Use `increase()` (absolute count over window), NOT `rate()`
        # which returns a per-second average — `rate(...) > 100` would
        # mean >100/sec = >360,000/hr, 3600x the intended threshold.
        # Cursor-bugbot 2026-04-21 HIGH.
        expr: sum by (source, field) (increase(edgeguard_misp_honest_null_violation_total[1h])) > 100
        for: 1h
        labels:
          severity: warning
          component: misp_writer
        annotations:
          summary: "EdgeGuard honest-NULL invariant violated at high rate ({{ $labels.source }}/{{ $labels.field }})"
          description: |
            A collector appears to be manufacturing wall-clock-NOW
            values for {{ $labels.field }} instead of passing NULL
            through when the source is silent. >100 violations/hour
            suggests systematic violation, not occasional federation drift.

            Remediation: audit the {{ $labels.source }} collector's
            {{ $labels.field }} extraction path for ``datetime.now()``
            fallbacks. See PR-N5 C7 + PR-N10 honest-NULL docs.

      - alert: EdgeGuardNeo4jIneffectiveBatch
        expr: sum by (label, source) (rate(edgeguard_neo4j_merge_ineffective_batch_total[5m])) > 0
        for: 5m
        labels:
          severity: critical
          component: neo4j_client
        annotations:
          summary: "EdgeGuard Neo4j MERGE batch silently producing zero writes ({{ $labels.label }}/{{ $labels.source }})"
          description: |
            A non-empty batch of {{ $labels.label }} nodes for source
            {{ $labels.source }} completed with ZERO counter-visible
            writes (no nodes_created, nodes_updated, properties_set,
            rels_created, rels_updated). Typical causes:

              * Source node missing (ensure_sources() misfire)
              * Constraint violation
              * Schema drift / wrong label

            Remediation:
              1. Check Neo4j logs for constraint errors on {{ $labels.label }}
              2. Query ``MATCH (s:Source {source_id: '{{ $labels.source }}'}) RETURN s``
                 to confirm Source node exists
              3. See docs/RUNBOOK.md § Neo4j silent-write failures

      # NOTE: a placeholder-reject alert (tracks spikes in the PR-N10
      # Fix #1 merge-reject rate) requires a counter that isn't wired
      # yet; it'll land in a PR-N12 follow-up alongside the counter
      # definition so the alert rule and its backing metric ship
      # atomically. Do not add here without the counter.
