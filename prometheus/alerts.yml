# ================================================================================
# EdgeGuard Prometheus Alert Rules
# ================================================================================

groups:
  # ================================================================================
  # Collection Alerts
  # ================================================================================
  - name: edgeguard_collection
    rules:
      - alert: EdgeGuardCollectionHighFailureRate
        # PR-N12 Fix #3 (cursor-audit 2026-04-21 BLOCK): the prior expr
        # used `rate(collected) > 0` as the denominator filter, which
        # DROPS the series when the rate is zero — producing NO RESULT
        # (undefined ratio) exactly when the collector has stopped
        # producing anything, which is the scenario where the alert
        # matters most. Fix: put total ATTEMPTS (successes + failures)
        # in the denominator, clamp_min to avoid 0/0, and require at
        # least one attempt. "Zero collected, any failures" is covered
        # by EdgeGuardNoIndicatorsCollected.
        expr: |
          (
            sum by (source) (rate(edgeguard_collection_failures_total[5m]))
            /
            clamp_min(
              sum by (source) (rate(edgeguard_indicators_collected_total[5m]))
              + sum by (source) (rate(edgeguard_collection_failures_total[5m])),
              0.001
            )
          ) > 0.2
          and
          sum by (source) (rate(edgeguard_collection_failures_total[5m])) > 0
        for: 5m
        labels:
          severity: warning
          component: collector
        annotations:
          summary: "High failure rate for {{ $labels.source }} collector"
          description: "{{ $labels.source }} collector has a failure rate above 20% for the last 5 minutes."

      - alert: EdgeGuardCollectionStale
        expr: time() - edgeguard_last_success_timestamp > 3600
        for: 5m
        labels:
          severity: critical
          component: collector
        annotations:
          summary: "Collection stale for {{ $labels.source }}"
          description: "No successful collection from {{ $labels.source }} in over 1 hour."

      - alert: EdgeGuardNoIndicatorsCollected
        # PR-N12 Fix #5 (cursor-audit 2026-04-21 BLOCK): two issues in
        # the prior expr: (1) LHS was `sum by (source)` which DROPPED
        # the `zone` label that RHS `edgeguard_source_health` carries,
        # so the vector `and` had no matching labels and the alert was
        # silent; (2) the hard-coded allow-list `source=~"otx|nvd|cisa|
        # abuseipdb"` silently excluded every new source (ThreatFox,
        # URLhaus, CyberCure, Feodo, SSLBL, MITRE, …). Fix: collapse
        # both sides to `source` with `on (source)`, drop the
        # regex allow-list — `source_health==1` already scopes to
        # known-to-pipeline sources.
        #
        # PR-N12 Fix #5 follow-up (cursor-bugbot 2026-04-21 Medium):
        # use `max by (source)` rather than `sum by (source)` on the
        # source_health aggregation. A source can be emitted with
        # health=1 in multiple zones (e.g. OTX reports into both
        # "global" and "healthcare"); `sum == 1` fails on multi-zone
        # sources and reintroduces the silent-alert bug we just fixed.
        # `max == 1` correctly expresses "is this source healthy in any
        # zone" without depending on zone cardinality.
        expr: |
          sum by (source) (increase(edgeguard_indicators_collected_total[1h])) == 0
          and on (source)
          max by (source) (edgeguard_source_health) == 1
        for: 30m
        labels:
          severity: warning
          component: collector
        annotations:
          summary: "No indicators collected from {{ $labels.source }}"
          description: "{{ $labels.source }} has not collected any indicators in the last hour."

  # ================================================================================
  # Circuit Breaker Alerts
  # ================================================================================
  - name: edgeguard_circuit_breaker
    rules:
      - alert: EdgeGuardCircuitBreakerOpen
        expr: edgeguard_circuit_breaker_state == 2
        for: 1m
        labels:
          severity: critical
          component: circuit-breaker
        annotations:
          summary: "Circuit breaker OPEN for {{ $labels.service }}"
          description: "The circuit breaker for {{ $labels.service }} is OPEN. Service is failing."

      - alert: EdgeGuardCircuitBreakerHalfOpen
        expr: edgeguard_circuit_breaker_state == 1
        for: 5m
        labels:
          severity: warning
          component: circuit-breaker
        annotations:
          summary: "Circuit breaker HALF-OPEN for {{ $labels.service }}"
          description: "The circuit breaker for {{ $labels.service }} is testing recovery."

      - alert: EdgeGuardConsecutiveFailuresHigh
        expr: edgeguard_consecutive_failures > 5
        for: 5m
        labels:
          severity: warning
          component: circuit-breaker
        annotations:
          summary: "High consecutive failures for {{ $labels.service }}"
          description: "{{ $labels.service }} has {{ $value }} consecutive failures."

  # ================================================================================
  # Service Health Alerts
  # ================================================================================
  - name: edgeguard_health
    rules:
      - alert: EdgeGuardServiceDown
        expr: edgeguard_service_up == 0
        for: 2m
        labels:
          severity: critical
          component: health
        annotations:
          summary: "Service {{ $labels.service }} is DOWN"
          description: "Health check failed for {{ $labels.service }}."

      - alert: EdgeGuardMISPUnhealthy
        expr: edgeguard_misp_health == 0
        for: 2m
        labels:
          severity: critical
          component: misp
        annotations:
          summary: "MISP {{ $labels.check_type }} is unhealthy"
          description: "MISP {{ $labels.check_type }} health check has failed."

      - alert: EdgeGuardSourceUnhealthy
        expr: edgeguard_source_health == 0
        for: 5m
        labels:
          severity: warning
          component: source
        annotations:
          summary: "Source {{ $labels.source }} ({{ $labels.zone }}) is unhealthy"
          description: "Data source {{ $labels.source }} in zone {{ $labels.zone }} is marked as unhealthy."

  # ================================================================================
  # Pipeline Alerts
  # ================================================================================
  - name: edgeguard_pipeline
    rules:
      - alert: EdgeGuardPipelineDurationHigh
        expr: |
          histogram_quantile(0.95, 
            sum(rate(edgeguard_pipeline_duration_seconds_bucket[5m])) by (le, pipeline_type)
          ) > 300
        for: 5m
        labels:
          severity: warning
          component: pipeline
        annotations:
          summary: "Pipeline {{ $labels.pipeline_type }} is slow"
          description: "Pipeline {{ $labels.pipeline_type }} 95th percentile duration is over 5 minutes."

      - alert: EdgeGuardNeo4jSyncStale
        # PR-N12 Fix #1 (cursor-audit 2026-04-21 BLOCK): the prior expr
        # `time() - (X > 0) > 259200` subtracted a histogram COUNT (int
        # like 42) from current time and was permanently firing or silent
        # depending on eval semantics. Use a dedicated
        # `edgeguard_neo4j_sync_last_success_timestamp` gauge
        # stamped at end of each successful sync.
        expr: |
          time() - edgeguard_neo4j_sync_last_success_timestamp > 259200
          and edgeguard_neo4j_sync_last_success_timestamp > 0
        for: 1h
        labels:
          severity: warning
          component: neo4j
        annotations:
          summary: "Neo4j sync is stale"
          description: "No Neo4j sync has completed in over 72 hours."

      - alert: EdgeGuardDAGRunFailures
        expr: |
          sum by (dag_id) (increase(edgeguard_dag_runs_total{status="failure"}[1h])) > 3
        for: 15m
        labels:
          severity: warning
          component: airflow
        annotations:
          summary: "DAG {{ $labels.dag_id }} has multiple failures"
          description: "DAG {{ $labels.dag_id }} has had more than 3 failures in the last hour."

      - alert: EdgeGuardDAGRunStuck
        expr: |
          (
            edgeguard_dag_run_start_timestamp > 0
            and (time() - edgeguard_dag_run_start_timestamp) > 3600
            and changes(edgeguard_dag_run_start_timestamp[30m]) == 0
          )
        for: 5m
        labels:
          severity: critical
          component: pipeline
        annotations:
          summary: "DAG run {{ $labels.dag_id }} appears stuck"
          description: "DAG {{ $labels.dag_id }} has had no task progress in over 1 hour (gauge unchanged for 30m)."

      - alert: EdgeGuardDAGLastSuccessStale
        expr: |
          edgeguard_dag_last_success_timestamp > 0
          and (time() - edgeguard_dag_last_success_timestamp) > 21600
          and edgeguard_dag_last_success_timestamp{dag_id!~"edgeguard_daily|edgeguard_neo4j_sync|edgeguard_baseline"}
        for: 15m
        labels:
          severity: warning
          component: pipeline
        annotations:
          summary: "No successful {{ $labels.dag_id }} run in 6 hours"
          description: "Last successful run of {{ $labels.dag_id }} was over 6 hours ago. Only applies to high/medium-frequency DAGs."

      - alert: EdgeGuardDailyDAGStale
        expr: |
          edgeguard_dag_last_success_timestamp{dag_id="edgeguard_daily"} > 0
          and (time() - edgeguard_dag_last_success_timestamp{dag_id="edgeguard_daily"}) > 90000
        for: 15m
        labels:
          severity: warning
          component: pipeline
        annotations:
          summary: "Daily DAG has not succeeded in over 25 hours"
          description: "edgeguard_daily runs once per day — no success in 25+ hours indicates a problem."

  # ================================================================================
  # Container Health Alerts (requires cAdvisor)
  # ================================================================================
  - name: edgeguard_containers
    rules:
      - alert: EdgeGuardContainerRestartLoop
        # PR-N12 Fix #2 (cursor-audit 2026-04-21 BLOCK): prior expr used
        # `container_restart_count` which cAdvisor does NOT export — the
        # alert was silently inert. cAdvisor exports `container_start_time_seconds`
        # (a timestamp); use `changes()` over a window to detect restarts.
        # Falls back to `kube_pod_container_status_restarts_total` if a
        # Kubernetes/kubelet scrape is also present (harmless when it's not).
        #
        # PR-N12 Fix #2 follow-up (cursor-bugbot 2026-04-21 Low): cAdvisor
        # labels the container as `name`; kubelet labels it as
        # `container`. The prior annotation only referenced
        # `{{ $labels.name }}`, so kubelet-branch fires rendered
        # "Container  is in a restart loop" (empty). `label_replace`
        # normalizes the kubelet `container` label into `name` on the
        # second branch so the annotation works uniformly.
        expr: |
          (
            changes(container_start_time_seconds{name=~"edgeguard.*"}[1h]) > 3
          )
          or
          (
            label_replace(
              increase(kube_pod_container_status_restarts_total{container=~"edgeguard.*"}[1h]),
              "name", "$1", "container", "(.*)"
            ) > 3
          )
        for: 5m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Container {{ $labels.name }} is in a restart loop"
          description: "{{ $labels.name }} has restarted {{ $value }} times in the last hour."

  # ================================================================================
  # Sync integrity — catches silent event drops in MISP->Neo4j sync.
  # Added after the 2026-04-14 NVD regression: a single MISP 500 on a
  # corrupted event caused ~99K CVEs to vanish from Neo4j and no alert
  # fired, because the existing rules only watch for total counts going
  # below a global floor (sum < 100) and had no signal for per-run
  # coverage gaps or per-label drops.
  # ================================================================================
  - name: edgeguard_sync_integrity
    rules:
      - alert: EdgeGuardSyncEventsFailed
        expr: edgeguard_sync_events_failed > 0
        for: 5m
        labels:
          severity: critical
          component: sync
        annotations:
          summary: "MISP->Neo4j sync had {{ $value }} failed event(s)"
          description: |
            The most recent MISP->Neo4j sync permanently failed to process
            {{ $value }} event(s) after all retries. Check pipeline logs for
            the event IDs and the underlying error (usually MISP 5xx on a
            corrupted event, or Neo4j connection loss).

      - alert: EdgeGuardSyncCoverageGap
        expr: |
          (
            edgeguard_sync_events_index_total
            - edgeguard_sync_events_processed
            - edgeguard_sync_events_failed
          ) != 0
        for: 5m
        labels:
          severity: critical
          component: sync
        annotations:
          summary: "MISP->Neo4j sync accounting gap: {{ $value }} unaccounted event(s)"
          description: |
            MISP index returned {{ with query "edgeguard_sync_events_index_total" }}{{ . | first | value }}{{ end }}
            events, but processed + failed does not equal that total. This
            means events were SILENTLY SKIPPED — the exact failure pattern
            of the 2026-04-14 NVD regression. Investigate immediately.

      # PR-N31 (post-PR-N29 follow-up, 2026-04-25): MISP fetch fallback
      # alerts. The PyMISP / requests-restSearch fallback in
      # ``fetch_edgeguard_events`` is engaged only when the primary
      # ``/events/index`` path errors. PR-N29 made the fallback paginate
      # + raise ``_MispFallbackHardError`` on hard failures (errors-payload,
      # unexpected-shape, non-200 mid-pagination, cap-hit). PR-N31 adds the
      # Prometheus counter + this alert pair so the operator gets paged
      # rather than learning about it from a missed baseline window.
      - alert: EdgeGuardMispFetchFallbackActive
        # Fires when ANY fallback engagement happens at all. Severity warning
        # because the fallback itself is functional — but sustained activity
        # signals the primary index path is broken (auth, 5xx, schema drift).
        # 10m window is the smallest that doesn't fire on a one-off retry.
        #
        # PR-N31 Bugbot round 1 (2026-04-25, MED): use ``sum by (branch)``
        # rather than bare ``sum`` so the ``branch`` label survives
        # aggregation. Symmetric with the HardError alert below (which
        # NEEDS the label for its annotation template) — matching shape
        # makes operator queries / Grafana panels uniform and future-
        # proofs the annotation if we ever want to reference ``branch``
        # in this alert too.
        expr: |
          sum by (branch) (rate(edgeguard_misp_fetch_fallback_active_total{outcome="engaged"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
          component: sync
        annotations:
          summary: "MISP fetch fallback active for >10m on {{ $labels.branch }} branch — primary /events/index path is broken"
          description: |
            EdgeGuard's MISP fetcher has fallen back to the slower
            PyMISP / requests-restSearch path ({{ $labels.branch }}
            branch) for >10 minutes. The primary ``/events/index`` path
            is returning errors. This is functional but slower; sustained
            activity is operator-visible evidence of upstream MISP
            problems. Grep ``[MISP-FETCH-FALLBACK-ACTIVE]`` in pipeline
            logs to correlate with the underlying failure mode (HTTP
            status, auth, payload shape). See docs/RUNBOOK.md §
            "MISP fetch fallback".

      - alert: EdgeGuardMispFetchFallbackHardError
        # Fires the moment a sentinel raise lands. CRITICAL because
        # _MispFallbackHardError is the "I refuse to silently truncate"
        # signal — it means a baseline run just failed in a way that
        # would otherwise have been invisible (silent data loss). 1m
        # window because we want this paged immediately, not 10m later.
        #
        # PR-N31 Bugbot round 1 (2026-04-25, MED): the ``$labels.branch``
        # template references in the annotations REQUIRE the ``branch``
        # label to survive aggregation. Pre-fix the bare ``sum(rate(...))``
        # collapsed all labels — the annotation would have rendered as
        # ``raised _MispFallbackHardError ()`` (empty parens) and the
        # RUNBOOK § 8 triage step ("identify which branch raised") would
        # have nothing to read. Use ``sum by (branch)``.
        expr: |
          sum by (branch) (rate(edgeguard_misp_fetch_fallback_active_total{outcome="hard_error"}[5m])) > 0
        for: 1m
        labels:
          severity: critical
          component: sync
        annotations:
          summary: "MISP fetch fallback raised _MispFallbackHardError ({{ $labels.branch }})"
          description: |
            EdgeGuard's MISP fetch fallback raised a hard error in the
            ``{{ $labels.branch }}`` branch. The sentinel exception means
            the fallback REFUSED to silently truncate — the baseline /
            sync run failed visibly rather than producing partial data
            that would have looked like a successful "no events" sync.
            See docs/RUNBOOK.md § "_MispFallbackHardError" for the
            diagnosis tree. The dagrun has already failed (PR-N29 H1 set
            retries=0 on the critical chain).

      - alert: EdgeGuardNeo4jLabelDropBig
        # Per-label 1-day drop > 50% of yesterday's value. Uses offset so
        # the comparison is against the same time yesterday — robust to
        # normal daily fluctuation but catches catastrophic loss like
        # CVE count 99K -> 980 (the NVD regression).
        # Minimum floor of 100 nodes to avoid noise on small labels.
        #
        # PromQL `and` returns the LHS vector filtered by the RHS label set,
        # so the current (today's) value must be on the left — otherwise
        # $value in the annotation would be yesterday's count, not today's.
        expr: |
          (
            edgeguard_neo4j_nodes
            <
            0.5 * (edgeguard_neo4j_nodes offset 1d)
          )
          and
          (edgeguard_neo4j_nodes offset 1d) > 100
        for: 15m
        labels:
          severity: critical
          component: neo4j
        annotations:
          summary: "Neo4j {{ $labels.label }} count dropped >50% in 24h"
          description: |
            {{ $labels.label }} (zone={{ $labels.zone }}) went from
            {{ with printf "edgeguard_neo4j_nodes{label=\"%s\",zone=\"%s\"} offset 1d" $labels.label $labels.zone | query }}
            {{ . | first | value }}{{ end }} to {{ $value }} in the last 24h.
            This usually indicates a silent skip in MISP->Neo4j sync or a
            truncated feed push. Cross-check edgeguard_sync_events_failed
            and MISP event health.

  # ================================================================================
  # Neo4j Alerts
  # ================================================================================
  - name: edgeguard_neo4j
    rules:
      - alert: EdgeGuardNeo4jNodesLow
        expr: sum(edgeguard_neo4j_nodes) < 100
        for: 1h
        labels:
          severity: warning
          component: neo4j
        annotations:
          summary: "Neo4j node count is unexpectedly low"
          description: "Total Neo4j nodes ({{ $value }}) is below expected threshold."

      - alert: EdgeGuardNeo4jQuerySlow
        expr: |
          histogram_quantile(0.95,
            sum(rate(edgeguard_neo4j_query_duration_seconds_bucket[5m])) by (le, query_type)
          ) > 5
        for: 5m
        labels:
          severity: warning
          component: neo4j
        annotations:
          summary: "Neo4j queries are slow"
          description: "{{ $labels.query_type }} queries 95th percentile is over 5 seconds."

  # ================================================================================
  # Host / Infrastructure Alerts
  # ================================================================================
  # PR-A audit fix (Prod Readiness HIGH): node-exporter is scraped by
  # prometheus.yml (see job ``node-exporter``) but no rule consumed its
  # output. A 730d baseline can fill 100GB of MISP attachments + airflow
  # logs unmonitored — Vanko's overnight ran ~8h and was already eating
  # several GB. Three rules cover the typical disk-full failure modes:
  # imminent (5%), warning (15%), and inode exhaustion (which can hit
  # before bytes-free does on filesystems with many small files like
  # airflow_logs).
  - name: edgeguard_host_disk
    rules:
      - alert: EdgeGuardDiskFree15Pct
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|devtmpfs"}
            / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|devtmpfs"}
          ) < 0.15
        for: 10m
        labels:
          severity: warning
          component: host
        annotations:
          summary: "Disk free below 15% on {{ $labels.mountpoint }}"
          description: |
            {{ $labels.mountpoint }} on {{ $labels.instance }} is at
            {{ $value | humanizePercentage }} free. The next baseline run
            (~50-100GB across MISP + Neo4j + airflow_logs) will likely
            trigger DiskFree5Pct. Action: prune airflow_logs older than 30d
            or expand the volume.

      - alert: EdgeGuardDiskFree5Pct
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|devtmpfs"}
            / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|devtmpfs"}
          ) < 0.05
        for: 2m
        labels:
          severity: critical
          component: host
        annotations:
          summary: "Disk free CRITICAL: below 5% on {{ $labels.mountpoint }}"
          description: |
            {{ $labels.mountpoint }} on {{ $labels.instance }} is at
            {{ $value | humanizePercentage }} free. Neo4j will enter
            read-only mode soon (which the writability healthcheck will
            detect — but writes already fail). Pause all collectors:
            ``edgeguard dag pause``. Then prune or expand.

      - alert: EdgeGuardInodesFree10Pct
        expr: |
          (
            node_filesystem_files_free{fstype!~"tmpfs|overlay|devtmpfs"}
            / node_filesystem_files{fstype!~"tmpfs|overlay|devtmpfs"}
          ) < 0.10
        for: 10m
        labels:
          severity: warning
          component: host
        annotations:
          summary: "Inodes free below 10% on {{ $labels.mountpoint }}"
          description: |
            {{ $labels.mountpoint }} has {{ $value | humanizePercentage }}
            inodes free. airflow_logs creates many small files; ext4
            volumes can exhaust inodes well before bytes. Prune logs.

  # ================================================================================
  # PR-N4 / PR-N5 / PR-N9 observability metrics (PR-N11 follow-up)
  # ================================================================================
  # These rules surface the counters added in PR-N4 (MISP-at-scale),
  # PR-N5 (C7 honest-NULL validator), and PR-N9 (Neo4j MERGE
  # ineffective-batch). Pre-PR-N11, the metrics existed but no alert
  # fired — the observability investment was invisible to operators.
  #
  # Baseline on-call: during the 730d baseline run, a non-zero rate
  # on ANY of these alerts means silent data loss or semantic drift.
  # Pre-PR-N7/N8/N9 the symptoms (multi-hour stalls, missing edges,
  # confidence flaps) were only diagnosed post-hoc; these alerts flip
  # detection latency from hours to 5-15 minutes.
  - name: edgeguard_pipeline_observability
    rules:
      - alert: EdgeGuardMispBatchPermanentFailure
        expr: sum by (source) (rate(edgeguard_misp_push_permanent_failure_total[5m])) > 0
        for: 5m
        labels:
          severity: critical
          component: misp_writer
        annotations:
          summary: "EdgeGuard losing MISP batches permanently ({{ $labels.source }})"
          description: |
            MISPWriter rejected one or more attribute batches after
            ``@retry_with_backoff(max_retries=4)`` exhausted. Each
            failure is ~500 attributes lost. Pre-PR-N4 this was a
            hand-counted log-line; now alertable.

            Remediation:
              1. Check MISP backend RAM / PHP memory_limit
              2. Check MySQL innodb_buffer_pool_size
              3. See docs/MISP_TUNING.md and docs/RUNBOOK.md § MISP OOM

      - alert: EdgeGuardMispSustainedBackoff
        # Use `increase()` (absolute count over window), NOT `rate()`
        # which returns a per-second average — `rate(...) > 1` would
        # mean >1/sec = >900/15min, 900x the intended threshold.
        # Cursor-bugbot 2026-04-21 HIGH.
        expr: sum by (source) (increase(edgeguard_misp_push_backoff_triggered_total[15m])) > 1
        for: 15m
        labels:
          severity: warning
          component: misp_writer
        annotations:
          summary: "EdgeGuard MISPWriter in extended cooldown >1×/15min ({{ $labels.source }})"
          description: |
            MISPWriter is hitting consecutive 5xx failures often enough
            to enter the 5-minute extended cooldown more than once per
            15 minutes. Backend is sustained-degraded. Distinguishes
            "occasional flap" from "sustained overload."

      - alert: EdgeGuardMispHonestNullViolation
        # Use `increase()` (absolute count over window), NOT `rate()`
        # which returns a per-second average — `rate(...) > 100` would
        # mean >100/sec = >360,000/hr, 3600x the intended threshold.
        # Cursor-bugbot 2026-04-21 HIGH.
        expr: sum by (source, field) (increase(edgeguard_misp_honest_null_violation_total[1h])) > 100
        for: 1h
        labels:
          severity: warning
          component: misp_writer
        annotations:
          summary: "EdgeGuard honest-NULL invariant violated at high rate ({{ $labels.source }}/{{ $labels.field }})"
          description: |
            A collector appears to be manufacturing wall-clock-NOW
            values for {{ $labels.field }} instead of passing NULL
            through when the source is silent. >100 violations/hour
            suggests systematic violation, not occasional federation drift.

            Remediation: audit the {{ $labels.source }} collector's
            {{ $labels.field }} extraction path for ``datetime.now()``
            fallbacks. See PR-N5 C7 + PR-N10 honest-NULL docs.

      - alert: EdgeGuardNeo4jIneffectiveBatch
        expr: sum by (label, source) (rate(edgeguard_neo4j_merge_ineffective_batch_total[5m])) > 0
        for: 5m
        labels:
          severity: critical
          component: neo4j_client
        annotations:
          summary: "EdgeGuard Neo4j MERGE batch silently producing zero writes ({{ $labels.label }}/{{ $labels.source }})"
          description: |
            A non-empty batch of {{ $labels.label }} nodes for source
            {{ $labels.source }} completed with ZERO counter-visible
            writes (no nodes_created, nodes_updated, properties_set,
            rels_created, rels_updated). Typical causes:

              * Source node missing (ensure_sources() misfire)
              * Constraint violation
              * Schema drift / wrong label

            Remediation:
              1. Check Neo4j logs for constraint errors on {{ $labels.label }}
              2. Query ``MATCH (s:Source {source_id: '{{ $labels.source }}'}) RETURN s``
                 to confirm Source node exists
              3. See docs/RUNBOOK.md § Neo4j silent-write failures

      - alert: EdgeGuardNeo4jBatchPermanentFailure
        # PR-N18 (2026-04-22): alert PR-N15 promised but didn't ship.
        # Fires when a MERGE batch fails permanently — either the
        # retry budget exhausted on transient errors (deadlock, GC
        # pause, lock timeout) or a non-retryable exception occurred.
        # Each increment = one batch (up to BATCH_SIZE=1000 items)
        # silently lost. Critical severity: at 730d baseline scale,
        # this directly correlates to silent data loss and must
        # page on-call.
        expr: sum by (label, source, reason) (rate(edgeguard_neo4j_batch_permanent_failure_total[5m])) > 0
        for: 5m
        labels:
          severity: critical
          component: neo4j_client
        annotations:
          summary: "EdgeGuard Neo4j batch permanently failed ({{ $labels.label }}/{{ $labels.source }}, reason={{ $labels.reason }})"
          description: |
            A Neo4j MERGE batch for {{ $labels.label }} from source
            {{ $labels.source }} failed permanently. Reason:
            ``{{ $labels.reason }}`` (either ``retries_exhausted``
            after 3 transient-error retries, or ``non_retryable``
            for schema/syntax/constraint errors).

            Each increment = one batch (up to 1000 rows) lost. See
            ``[BATCH-PERMANENT-FAILURE]`` log lines for exact batch
            context.

            Remediation:
              1. Tail Airflow logs: ``grep "\[BATCH-PERMANENT-FAILURE\]" /opt/airflow/logs/**/*.log | tail -20``
              2. If ``retries_exhausted``: Neo4j is overloaded. Scale or wait.
              3. If ``non_retryable``: schema drift or constraint. Check
                 Neo4j logs: ``docker logs edgeguard-neo4j 2>&1 | grep -i constraint``
              4. See docs/RUNBOOK.md § Top-5 failure mode #4 (Neo4j ineffective-batch)

      - alert: EdgeGuardMergeRejectPlaceholderSpike
        # PR-N18 (2026-04-22): alert paired with the new
        # ``edgeguard_merge_reject_placeholder_total`` counter. Low
        # baseline rate is expected (feeds emit ``unknown`` as
        # defaults), but a sudden spike means a compromised or
        # malconfigured collector is emitting placeholder-named
        # Malware / ThreatActor nodes at scale. Warning severity —
        # PR-N10's merge-time reject already blocks the actual writes,
        # so the graph is safe; the alert surfaces the upstream issue.
        expr: sum by (label, source) (increase(edgeguard_merge_reject_placeholder_total[15m])) > 10
        for: 15m
        labels:
          severity: warning
          component: neo4j_client
        annotations:
          summary: "EdgeGuard rejecting placeholder-name {{ $labels.label }} MERGEs at high rate ({{ $labels.source }})"
          description: |
            {{ $labels.source }} is attempting to create {{ $labels.label }}
            nodes with placeholder names (``unknown``/``N/A``/``generic``/
            ``malware``/``apt``/...) at rate > 10/15min. PR-N10 merge-
            time reject blocks the actual writes — the graph is safe.

            Low rate is expected (feed defaults); high rate suggests
            a feed regression or adversarial injection.

            Remediation:
              1. Identify the offending source from the label.
              2. Extend the collector's normalization to skip placeholder
                 names BEFORE they reach merge_malware/merge_actor.
              3. If adversarial: freeze the source, audit the MISP event.
              4. See ``src/node_identity.py:_REJECTED_PLACEHOLDER_NAMES``
                 for the full rejected list.
              5. See docs/RUNBOOK.md § Top-5 failure mode #5

      - alert: EdgeGuardMispEventAttributesTruncated
        # PR-N24 audit fix (H3): wires the
        # ``edgeguard_misp_event_attributes_truncated_total`` counter
        # added in PR-N23 to an actual alert. Pre-N24 the counter
        # existed but no alert fired — observability was unwired.
        #
        # Each increment = one MISP event whose attribute list exceeded
        # ``MAX_ATTRIBUTES_PER_EVENT`` and was silently sliced by
        # ``MISPCollector.collect``. At baseline scale large NVD events
        # routinely lose 75%+ of their data this way. Non-zero rate
        # within an hour means active data loss — operator should
        # either raise the cap (if MISP can handle it) or investigate
        # why the source is producing over-sized events.
        #
        # Use ``increase()`` (absolute count over window) NOT
        # ``rate()`` — same lesson as PR-N12 follow-ups.
        expr: sum by (source) (increase(edgeguard_misp_event_attributes_truncated_total[1h])) > 0
        for: 5m
        labels:
          severity: warning
          component: misp_collector
        annotations:
          summary: "EdgeGuard MISP collector truncated over-sized event(s) for {{ $labels.source }} — silent data loss"
          description: |
            ``MISPCollector.collect`` truncated one or more events from
            source ``{{ $labels.source }}`` whose attribute list
            exceeded ``MAX_ATTRIBUTES_PER_EVENT``. Each occurrence
            silently drops attributes (typically 75%+ of the event's
            data on large NVD events).

            Remediation:
              1. Identify the offending event(s):
                 ``grep -E 'truncated.*attributes' /opt/airflow/logs/**/misp_collector.log | tail -20``
              2. Decide: raise ``MAX_ATTRIBUTES_PER_EVENT`` (if MISP
                 backend can handle larger events — check PHP
                 ``memory_limit`` and MySQL ``innodb_buffer_pool_size``
                 first), OR investigate why the upstream source is
                 producing over-sized events (collector regression /
                 missing pagination).
              3. See ``src/collectors/misp_collector.py`` and
                 ``docs/RUNBOOK.md`` § MISP truncation.

      - alert: EdgeGuardBuildRelationshipsSilentDeath
        # PR-N21 Bravo-ops: catches a silent ``build_relationships``
        # subprocess death (exit 137 OOM, SIGKILL from timeout, crash
        # before the ``[BUILD_RELATIONSHIPS SUMMARY]`` line is emitted).
        # PR-K3's streaming helper already bounds Python-side buffering
        # — this alert catches the OTHER failure modes: Neo4j-side
        # MemoryLimitExceededException inside the TX, kernel OOM of the
        # Airflow worker, or a build_relationships.py exception that
        # dies before emitting the summary counter (``record_build_
        # relationships_completion``). If the counter hasn't incremented
        # for 6h while a DAG run started in the last 8h, we have a
        # silent death.
        #
        # Bugbot round 1 (PR #105, MEDIUM): pre-fix PromQL had a label
        # mismatch on the ``AND`` — left side (``absent(...)`` or
        # ``rate(...) == 0``) produces an empty label set ``{}`` while
        # the right side (``max_over_time({dag_id="edgeguard_baseline"})``)
        # carries the ``dag_id`` label. Default PromQL ``AND`` requires
        # exact label-set equality → no match → alert never fires.
        # Fix: ``and on()`` — ignore ALL labels on the join, since what
        # matters here is simply "both conditions true in the same
        # evaluation step" not "same series."
        expr: |
          (
            absent(edgeguard_build_relationships_completions_total)
            OR
            rate(edgeguard_build_relationships_completions_total[6h]) == 0
          )
          and on()
          (
            max_over_time(edgeguard_dag_run_start_timestamp{dag_id="edgeguard_baseline"}[8h])
              > (time() - (6 * 60 * 60))
          )
        for: 10m
        labels:
          severity: critical
          component: build_relationships
        annotations:
          summary: "build_relationships may have died silently — no SUMMARY emitted for 6h after baseline start"
          description: |
            The ``edgeguard_build_relationships_completions_total`` counter
            has not incremented for 6 hours despite the
            ``edgeguard_baseline`` DAG starting within the last 8h.
            build_relationships emits this counter ONLY when it reaches
            the ``[BUILD_RELATIONSHIPS SUMMARY]`` log line — absence =
            subprocess died before reaching the end.

            Common causes (ranked by likelihood):
              1. Airflow worker OOM-killed (exit 137). Check:
                 ``docker stats edgeguard-airflow-worker --no-stream``
              2. Neo4j MemoryLimitExceededException inside an APOC batch.
                 Check: ``docker logs edgeguard-neo4j 2>&1 | grep -iE
                 'MemoryLimit|OutOfMemory'``
              3. Airflow task ``execution_timeout`` (5h default) fired.
                 Check the task's state in Airflow UI.

            Remediation:
              1. Check Airflow task state + exit code; if 137 → OOM.
              2. Raise ``AIRFLOW_MEMORY_LIMIT`` to 12g and/or lower
                 ``NEO4J_TX_MEMORY_MAX`` to 4g (see docs/RUNBOOK.md §
                 "Bravo-ops: memory posture for next baseline").
              3. Re-trigger the baseline after raising memory.

      - alert: EdgeGuardApocBatchPartial
        # PR-N21 Bravo-ops: ANY partial APOC batch during
        # build_relationships = partial data loss in that step. Fires
        # within 15m of the first ``[PARTIAL]`` log line (via the
        # paired ``record_apoc_batch_partial`` counter). P2 severity —
        # operator should re-run the specific step before downstream
        # enrichment/analysis contaminates the graph with partial data.
        expr: sum by (step) (increase(edgeguard_apoc_batch_partial_total[15m])) > 0
        for: 0m
        labels:
          severity: warning
          component: build_relationships
        annotations:
          summary: "APOC batch returned partial success in build_relationships step {{ $labels.step }} — partial data loss"
          description: |
            apoc.periodic.iterate for build_relationships step
            ``{{ $labels.step }}`` reported non-empty errorMessages.
            This means some inner-query transactions failed mid-batch
            without propagating to the Python layer. The graph has
            partial data for this step.

            Common causes:
              1. Neo4j MemoryLimitExceededException inside a single
                 batch transaction.
              2. Deadlock timeout on a single batch.
              3. Per-row Cypher error (schema drift, constraint violation).

            Remediation:
              1. Log probe: ``docker logs edgeguard-airflow-worker
                 2>&1 | grep -E '\[PARTIAL\]' | tail -20``
              2. Inspect the reported errorMessages in the log line
                 (first 3 errors are pre-logged).
              3. Re-run build_relationships for this step only, or
                 accept partial data and move to the next step if
                 errors are transient and row count is acceptable.
              4. See docs/RUNBOOK.md § "APOC partial batch response".
