services:
  misp:
    image: coolacid/misp-docker:latest
    container_name: misp_misp_1
    restart: unless-stopped
    # Memory limit bumped to 8g (from the 4g default) because a full
    # EdgeGuard baseline pushes 95K+ attributes per event (NVD feed),
    # and PHP loads the full event context on every POST /attributes/add.
    # On a 4g cap the MISP container OOM-kills mid-baseline and the
    # Airflow task has to retry. See docs/DOCKER_SETUP_GUIDE.md §
    # "MISP memory pressure" for the symptoms.
    mem_limit: 8g
    ports:
      - "127.0.0.1:8443:443"
      - "127.0.0.1:5000:80"
    environment:
      - MISP_ADMIN_EMAIL=admin@admin.test
      - MISP_ADMIN_PASSWORD=admin
      - MISP_BASEURL=https://localhost:8443
      - MISP_HOSTNAME=localhost
    volumes:
      - misp_data:/var/www/MISP
      - misp_redis:/var/www/MISP/App/files
      - /etc/localtime:/etc/localtime:ro
      # PHP process memory_limit override — the Docker mem_limit (8g) is the
      # container ceiling; this .ini raises the PHP-internal ceiling from 2g
      # to match. Without it, PHP OOM-kills on the NVD 95K-attribute event
      # even though the container has 6g of headroom.
      - ./php-overrides.ini:/usr/local/etc/php/conf.d/99-edgeguard.ini:ro
    networks:
      - misp_network

  misp_db:
    image: mysql:8.0
    container_name: misp_db_1
    restart: unless-stopped
    # Matches the misp service bump — a 95K-row insert needs working
    # memory for InnoDB buffer pool and query cache. 4g is the old
    # default and was OOM-prone during baseline.
    mem_limit: 8g
    environment:
      - MYSQL_ROOT_PASSWORD=misp
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=misp
    volumes:
      - misp_db:/var/lib/mysql
    networks:
      - misp_network

volumes:
  misp_data:
  misp_redis:
  misp_db:

networks:
  misp_network:
    driver: bridge
