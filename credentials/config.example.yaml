# =============================================================================
# EdgeGuard Configuration Template
# =============================================================================
# Copy this file to config.yaml and fill in your values
# DO NOT commit config.yaml to version control - it's in .gitignore
# =============================================================================

# =============================================================================
# NEO4J CONFIGURATION
# =============================================================================
# Neo4j database connection settings
neo4j:
  uri: "bolt://localhost:7687"
  user: "neo4j"
  password: "YOUR_NEO4J_PASSWORD_HERE"

# =============================================================================
# MISP CONFIGURATION
# =============================================================================
# Your local or cloud MISP instance
misp:
  url: "https://localhost:8443"
  api_key: "YOUR_MISP_API_KEY_HERE"
  # Admin credentials (for server access, not API)
  admin_email: "admin@admin.test"
  admin_password: "YOUR_MISP_ADMIN_PASSWORD_HERE"
  # SSL verification: must be true in production.
  # Set to false ONLY for local dev with self-signed certs.
  ssl_verify: true

# =============================================================================
# ALIENVAULT OTX (Now LevelBlue)
# =============================================================================
# Get free account at: https://otx.alienvault.com
# Rate limit: 30 requests/minute (free tier)
otx:
  api_key: "YOUR_OTX_API_KEY_HERE"

# =============================================================================
# NVD (National Vulnerability Database)
# =============================================================================
# Register for free API key at: https://nvd.nist.gov/developers/request-an-api-key
# Rate limit: 50 requests/30 seconds (with API key); 5/30s without (NIST)
nvd:
  api_key: "YOUR_NVD_API_KEY_HERE"

# =============================================================================
# VIRUSTOTAL
# =============================================================================
# Get free account at: https://www.virustotal.com
# Free tier: 4 lookups/min, 500/day, 15.5K/month
virustotal:
  api_key: "YOUR_VIRUSTOTAL_API_KEY_HERE"
  rate_limit: 4      # requests per minute
  daily_quota: 500   # requests per day

# =============================================================================
# ABUSEIPDB (Optional)
# =============================================================================
# Get free account at: https://www.abuseipdb.com
# Free tier: 1,000 lookups/day
abuseipdb:
  api_key: "YOUR_ABUSEIPDB_API_KEY_HERE"  # Optional - leave empty if not using

# =============================================================================
# SLACK ALERTS (Optional)
# =============================================================================
# =============================================================================
# EDGEGUARD SETTINGS
# =============================================================================
edgeguard:
  # Enable/disable metrics collection
  enable_metrics: false
  
  # Base directory (auto-detected if not set)
  # base_dir: "/path/to/EdgeGuard"
  
  # Maximum samples to collect per source
  max_samples_per_source: 500

# =============================================================================
# COLLECTION INTERVALS
# =============================================================================
# ⚠️ RATE LIMIT WARNINGS ⚠️
# -------------------+-------------------+----------------------------------------
# Source             | Minimum Interval  | Rate Limit Info
# -------------------+-------------------+----------------------------------------
# OTX                | >= 30 minutes      | 30 req/min (free tier)
# NVD                | >= 30 seconds      | 50 req/30 sec (with API key)
# VirusTotal         | >= 15 seconds      | 4 req/min, 500/day (free tier)
# AbuseIPDB          | >= 15 seconds      | 1,000 req/day (free tier)
# MISP               | >= 5 minutes       | Varies by instance
# -------------------+-------------------+----------------------------------------
intervals:
  # Phase 1: Source → MISP refresh interval (in hours)
  # WARNING: OTX requires >= 2 hours for free tier (30 req/min limit)
  misp_refresh_interval: 8
  
  # Phase 2: MISP → Neo4j sync interval (in hours)
  neo4j_sync_interval: 72

  # Source-specific overrides (in hours)
  source_intervals:
    otx: 2          # 2 hours - respects OTX rate limit
    cisa: 0.5       # 30 minutes - CISA KEV updates
    nvd: 0.5        # 30 minutes - NVD rate limit allows this
    mitre: 24       # 24 hours - stable framework data

# =============================================================================
# SECTOR TIME RANGES
# =============================================================================
# How many months of historical data to fetch for each sector
sector_time_ranges:
  healthcare: 24    # 2 years for healthcare threats
  energy: 24        # 2 years for energy/CNI threats
  finance: 24      # 2 years for financial threats (max allowed per policy)
  global: 12       # 1 year for general threats

# =============================================================================
# SECTOR KEYWORDS
# =============================================================================
# Keywords used to categorize indicators by sector
# (Advanced - usually no need to modify)
sector_keywords:
  healthcare:
    - hospital
    - medical
    - pharma
    - health
    - patient
    - clinic
  energy:
    - scada
    - grid
    - power
    - utility
    - ics
    - industrial
  finance:
    - bank
    - banking
    - payment
    - trading
    - crypto
