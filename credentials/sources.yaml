abuseipdb:
  api_key_env: ABUSEIPDB_API_KEY
  description: IP reputation
  enabled: true
  name: AbuseIPDB
  rate_limit: 1000/day
feodo:
  api_key_env: null
  description: Banking trojan C&C servers
  enabled: true
  name: Feodo Tracker
  rate_limit: unlimited
urlhaus:
  api_key_env: null
  description: Malware URLs
  enabled: true
  name: URLhaus
  rate_limit: unlimited
virustotal:
  api_key_env: VIRUSTOTAL_API_KEY
  description: File and URL reputation
  enabled: true
  name: VirusTotal
  rate_limit: 4/min
